name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Explain Pages enablement requirements
        if: ${{ env.PAGES_ENABLEMENT_TOKEN == '' }}
        run: |
          echo 'PAGES_ENABLEMENT_TOKEN is not configured.'
          echo 'This workflow expects GitHub Pages to already be enabled for GitHub Actions in repository settings.'
          echo 'Alternatively, add a PAT secret named PAGES_ENABLEMENT_TOKEN to let actions/configure-pages enable Pages automatically.'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: ${{ env.PAGES_ENABLEMENT_TOKEN != '' }}
          token: ${{ env.PAGES_ENABLEMENT_TOKEN != '' && env.PAGES_ENABLEMENT_TOKEN || github.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun run test

      - name: Build app
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
